version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      hedera:
        patterns:
          - "@hashgraph/*"
          - "@hiero-ledger/*"
          - "hedera-agent-kit"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
