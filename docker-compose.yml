services:
  db:
    image: postgres:16-alpine
    container_name: hbario-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hbario
      POSTGRES_PASSWORD: hbario
      POSTGRES_DB: hbario
    ports:
      - "5432:5432"
    volumes:
      - hbario_pgdata:/var/lib/postgresql/data

volumes:
  hbario_pgdata:
