# Render Blueprint for hbario
#
# Render → New → Blueprint → point at this repo. Render reads this file and
# provisions a Postgres database + a web service in the same region. Fill in
# the `sync: false` secrets in the Render dashboard after the first deploy.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: hbario-db
    databaseName: hbario
    user: hbario
    plan: free               # hackathon/demo tier; bump to basic_1gb+ for production
    region: oregon           # match the web service region below
    postgresMajorVersion: 16

services:
  - type: web
    name: hbario
    runtime: node
    plan: starter            # bump to "standard" once you have real traffic
    region: oregon
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /agent.json
    autoDeploy: true
    envVars:
      # ─── Connected automatically ─────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: hbario-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: MCP_PUBLIC_BASE_URL
        value: https://hbario.com

      # ─── Generated once at provisioning time ────────────────────────
      # Render fills this in automatically with a strong random value the
      # first time it provisions the service.
      - key: JWT_SECRET
        generateValue: true

      # ─── Fill in via dashboard (sync: false) ────────────────────────
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_DEFAULT_NETWORK
        value: mainnet         # judges land on mainnet by default; can switch in HashPack

      - key: HEDERA_TREASURY_ACCOUNT_ID_TESTNET
        sync: false
      - key: HEDERA_TREASURY_ACCOUNT_ID_MAINNET
        sync: false
      - key: HEDERA_AI_TREASURY_ACCOUNT_ID
        sync: false

      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-4-5
      - key: AI_INPUT_USD_PER_1K
        value: "0.003"
      - key: AI_OUTPUT_USD_PER_1K
        value: "0.015"
